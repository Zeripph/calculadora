{% extends "base.html" %}

{% block title %}Calculadora de VO² máx{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">
        
        <div class="card shadow-lg">
            <div class="card-header text-white text-center">
                <h1 class="h3">Calculadora de VO² máx</h1>
                <p class="mb-0">Teste de Caminhada de Rockport</p>
            </div>
            <div class="card-body p-4">
                
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label for="peso" class="form-label">Peso Corporal (kg)</label><input type="number" class="form-control" name="peso" step="0.1" required></div>
                        <div class="col-md-6 mb-3"><label for="idade" class="form-label">Idade (anos)</label><input type="number" class="form-control" name="idade" required></div>
                        <div class="col-md-6 mb-3"><label for="genero" class="form-label">Gênero</label><select class="form-select" name="genero" required><option value="1">Masculino</option><option value="0">Feminino</option></select></div>
                        <div class="col-md-6 mb-3"><label for="frequencia_cardiaca" class="form-label">FC Final (bpm)</label><input type="number" class="form-control" name="frequencia_cardiaca" required></div>
                    </div>
                    <div classs="row align-items-end">
                        <div class="col-12"><label class="form-label">Tempo da Caminhada (1 milha)</label></div>
                        <div class="col-md-5 col-6 mb-3"><input type="number" class="form-control" name="tempo_minutos" placeholder="Minutos" required></div>
                        <div class="col-md-1 text-center d-none d-md-block mb-3"><strong>:</strong></div>
                        <div class="col-md-5 col-6 mb-3"><input type="number" class="form-control" name="tempo_segundos" placeholder="Segundos" required></div>
                    </div>
                    <div class="d-grid mt-3"><button type="submit" class="btn btn-primary btn-lg">Calcular VO² máx</button></div>
                </form>
                
                {% if resultado_vo2 %}
                <div class="alert alert-success text-center mt-4" role="alert">
                    <h4 class="alert-heading">Resultado</h4>
                    <p class="display-4 fw-bold">{{ resultado_vo2 }}</p>
                    <hr>
                    <p class="mb-0">VO²máx (ml.kg⁻¹.min⁻¹)</p>
                </div>
                {% endif %}
    </div>
</div>
{% endblock %}
